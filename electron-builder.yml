appId: com.buddy.app
productName: Buddy
directories:
  output: release
files:
  - out/**/*
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
publish:
  provider: github
  owner: davidhoo
  repo: buddy
